name: Simple Action

on: [push]

jobs:
  simple-action:
    runs-on: ubuntu-latest
    steps:
        - name: Simple JS Action
          id: greet
          uses: actions/hello-world-javascript-action@79ac0da13ee392da3fdd151813d5ce4658cb7e27
          with:
             who-to-greet: Sourabh
        - name: Log Greeting Time
          run: echo "${{ steps.greet.outputs.time}}"
