name: Workflow Dirs and Shells

on: [push]

defaults:
  run:
    shell: bash

jobs:
  display-wd-info:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Display Working Directory & List Files
        run: |
          pwd
          ls -a
          echo $env:GITHUB_SHA
          echo $env:GITHUB_REPOSITORY
          echo $env:GITHUB_WORKSPACE

      - name: Change Working Dir
        working-directory: /home/runner
        run: pwd

  display-wd-info-windows:
    runs-on: windows-latest
    defaults:
        run:
            shell: pwsh

    steps:
      - name: Display Working Directory & List Files
        run: |
          Get-Location
          dir
          echo $env:GITHUB_SHA
          echo $env:GITHUB_REPOSITORY
          echo $env:GITHUB_WORKSPACE

      - name: Python Shell
        shell: python
        run: |
          import platform
          print(platform.processor())