name: Manual Deployment Workflow

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Which environment you want to deploy"
        required: true
        type: choice
        options:
          - development
          - staging
          - production
        default: development

      version:
        description: "What version are you deploying? (e.g. v1.0.0)"
        type: string
        required: false
        default: "v1.0.0"

      run_tests:
        description: "Should run before deploying?"
        type: boolean
        default: true

jobs:
  learn-variables:
    runs-on: ubuntu-latest

    env:
      APP_NAME: "my-coding-adda-app"
      NODE_VERSION: "20"

    steps:
      - name: "Step 1 - Show user inputs"
        run: |
          echo "============="
          echo "Inputs you provided:"
          echo "============="
          echo "Environment: ${{ inputs.environment }}"
          echo "Version: ${{ inputs.version }}"
          echo "Run Tests: ${{ inputs.run_tests }}"

      - name: "Step 2 - Use environment variables"
        run: |
          echo "============="
          echo "Environment Variables:"
          echo "============="
          echo "App Name: $APP_NAME"
          echo "Node Version: $NODE_VERSION"

      - name: "Step 3 - Use a secret"
        env:
          MY_KEY: ${{ secrets.MY_API_KEY }}

        run: |
          echo "==============================="
          echo "Secrets"
          echo "==============================="
          echo "API Key is set"
          echo "First 6 chars: ${MY_KEY:0:6}***"

      - name: "Step 4 - Use repository variable"
        run: |
          echo "App URL from Settings: ${{ vars.APP_URL }}"

      - name: "Step 5 - Create environment variable"
        run: |
          TODAY=$(date +'%Y-%m-%d')
          echo "TODAY=$TODAY" >> $GITHUB_ENV
          echo "Created variable TODAY=$TODAY"

      - name: "Step 6 - Use the dynamic variable from Step 5"
        run: |
          echo "Today's date is: $TODAY"

      - name: "Step 7a - Run tests (only if user said yes)"
        if: inputs.run_tests == true
        run: |
          echo " Running tests..."
          echo "(Your actual test command goes here, like: npm test)"

      - name: "Step 7b - Skip tests (if user said no)"
        if: inputs.run_tests == false
        run: |
          echo " Skipping tests as requested."

      - name: "Step 7c - Production warning"
        if: inputs.environment == 'production'
        run: |
          echo " You are deploying to PRODUCTION!"
          echo "Environment: ${{ inputs.environment }}"
          echo "Version: ${{ inputs.version }}"

      - name: "Step 8 - Final summary"
        run: |
          echo "================================="
          echo " Deployment Summary"
          echo "================================="
          echo "Environment : ${{ inputs.environment }}"
          echo "Version     : ${{ inputs.version }}"
          echo "Run Tests   : ${{ inputs.run_tests }}"
          echo "App Name    : $APP_NAME"
          echo "Today's Date: $TODAY"
          echo " Workflow completed!"