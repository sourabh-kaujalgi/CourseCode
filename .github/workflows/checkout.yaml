name: Checkout 
on: [push]

jobs:
    checkout-and-display-files:
        runs-on: ubantu-latest
        steps: 
            - name: List files before
              run : la-a
            - name: Checkout
              run: |
               git init 
               git remote add origin "https://$GITHUB_ACTOR: ${{ secrets.GITHUB_TOKEN}}@github.com/$GITHUB_REPOSITORY.git"
               git fetch origin 
               git checkout main
            - name: Lits file after 
              run: ls -a 
                

