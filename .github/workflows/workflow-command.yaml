name: Workflow Commands
on: [push]

jobs:
  testing-wf-commands:
    runs-on: ubuntu-latest

    steps:
      - name: Setting an error message
        run: echo "::error::Missing semicolon"
      - name: Setting an debug message with params
        run:  echo "::error title::debug title,file=aap.js,line =2, endLine=3,col=5,endCoilumn=7 ::Missinng Semocolon"
      - name: Setting an Warning message with params
        run:  echo "::error title::Warning title,file=aap.js,line =2, endLine=3,col=5,endCoilumn=7 ::Missinng Semocolon"
      - name: Setting an Notice message with params
        run:  echo "::error title::Notice title,file=aap.js,line =2, endLine=3,col=5,endCoilumn=7 ::Missinng Semocolon"


